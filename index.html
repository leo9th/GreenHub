<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (SEO): short tagline — trailing period omitted for cleaner tabs -->
    <title>GreenHub — Nigeria's marketplace for shoppers, sellers, and stores</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#022c22" />

    <!-- SEO Meta (primary one-liner) -->
    <meta name="description" content="GreenHub is Nigeria's hybrid marketplace where people and businesses buy and sell electronics, fashion, and everyday goods—peer-to-peer and from shops—in one trusted place." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://greenhub.com.ng/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://greenhub.com.ng/" />
    <meta property="og:title" content="GreenHub — Nigeria's marketplace for shoppers, sellers, and stores" />
    <meta property="og:description" content="GreenHub is Nigeria's hybrid marketplace where people and businesses buy and sell electronics, fashion, and everyday goods—peer-to-peer and from shops—in one trusted place." />
    <meta property="og:image" content="/og-banner.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://greenhub.com.ng/" />
    <meta name="twitter:title" content="GreenHub — Nigeria's marketplace for shoppers, sellers, and stores" />
    <meta name="twitter:description" content="Shop. Sell. Grow on GreenHub." />
    <meta name="twitter:image" content="/og-banner.png" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Theme Initialization (UNCHANGED - DO NOT TOUCH) -->
    <script>
      (function () {
        try {
          var k = "greenhub-theme";
          var s = localStorage.getItem(k);
          var dark;
          if (s === "dark") dark = true;
          else if (s === "light") dark = false;
          else dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <!-- App Root (DO NOT REMOVE) -->
    <div id="root">
      <noscript>You need to enable JavaScript to run GreenHub.</noscript>
    </div>

    <!-- React Entry (DO NOT TOUCH) -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
